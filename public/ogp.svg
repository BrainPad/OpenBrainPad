<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#e8f8ff"/>
      <stop offset="100%" stop-color="#b8e8fa"/>
    </linearGradient>
    <linearGradient id="blob1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#7dd3fc" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="blob2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#bae6fd" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="f1"><feGaussianBlur stdDeviation="50"/></filter>
    <filter id="f2"><feGaussianBlur stdDeviation="70"/></filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="24" flood-color="#0369a1" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative blobs -->
  <ellipse cx="1100" cy="80"  rx="280" ry="220" fill="url(#blob1)" filter="url(#f2)"/>
  <ellipse cx="80"   cy="560" rx="220" ry="180" fill="url(#blob2)" filter="url(#f1)"/>
  <ellipse cx="600"  cy="640" rx="300" ry="130" fill="#7dd3fc" opacity="0.2" filter="url(#f1)"/>

  <!-- White card panel -->
  <rect x="80" y="60" width="1040" height="510" rx="32" fill="white" opacity="0.72" filter="url(#shadow)"/>

  <!-- Top accent bar -->
  <rect x="80" y="60" width="1040" height="10" rx="32" fill="#38bdf8"/>
  <rect x="80" y="66" width="1040" height="4"  fill="#38bdf8"/>

  <!-- Logo (logo-hero.png 1024x221 → 820x177) centered in card -->
  <image href="logo-hero.png" x="190" y="130" width="820" height="177"/>

  <!-- Divider -->
  <rect x="190" y="332" width="820" height="2" rx="1" fill="#bae6fd"/>

  <!-- Tagline -->
  <text x="600" y="392" text-anchor="middle" font-family="'Hiragino Sans','Yu Gothic','Meiryo',sans-serif" font-size="26" font-weight="600" fill="#0369a1">ブレインパッドの「中身」をオープンにするプロジェクト</text>

  <!-- Tag pills -->
  <rect x="248" y="424" width="118" height="36" rx="18" fill="#e0f2fe"/>
  <text x="307" y="447" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#0284c7">📃 資料公開</text>

  <rect x="382" y="424" width="104" height="36" rx="18" fill="#e0f2fe"/>
  <text x="434" y="447" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#0284c7">🎙 Podcast</text>

  <rect x="502" y="424" width="100" height="36" rx="18" fill="#e0f2fe"/>
  <text x="552" y="447" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#0284c7">🤝 Meetup</text>

  <rect x="618" y="424" width="82" height="36" rx="18" fill="#e0f2fe"/>
  <text x="659" y="447" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#0284c7">📖 書籍</text>

  <rect x="716" y="424" width="116" height="36" rx="18" fill="#e0f2fe"/>
  <text x="774" y="447" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#0284c7">📚 勉強会</text>

  <!-- URL -->
  <text x="600" y="530" text-anchor="middle" font-family="'Courier New',monospace" font-size="17" fill="#7ea8be">brainpad.github.io/OpenBrainPad</text>
</svg>
