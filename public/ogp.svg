<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#e0f2fe"/>
      <stop offset="60%"  stop-color="#bae6fd"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="60"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative blobs -->
  <circle cx="1050" cy="100" r="200" fill="#38bdf8" opacity="0.25" filter="url(#blur2)"/>
  <circle cx="100"  cy="500" r="160" fill="#7dd3fc" opacity="0.2"  filter="url(#blur1)"/>
  <circle cx="600"  cy="600" r="120" fill="#bae6fd" opacity="0.3"  filter="url(#blur1)"/>

  <!-- Dot grid -->
  <g opacity="0.12" fill="#0369a1">
    <circle cx="960" cy="200" r="3"/><circle cx="1000" cy="200" r="3"/><circle cx="1040" cy="200" r="3"/><circle cx="1080" cy="200" r="3"/>
    <circle cx="960" cy="240" r="3"/><circle cx="1000" cy="240" r="3"/><circle cx="1040" cy="240" r="3"/><circle cx="1080" cy="240" r="3"/>
    <circle cx="960" cy="280" r="3"/><circle cx="1000" cy="280" r="3"/><circle cx="1040" cy="280" r="3"/><circle cx="1080" cy="280" r="3"/>
    <circle cx="80"  cy="80"  r="3"/><circle cx="120" cy="80"  r="3"/><circle cx="160" cy="80"  r="3"/>
    <circle cx="80"  cy="120" r="3"/><circle cx="120" cy="120" r="3"/><circle cx="160" cy="120" r="3"/>
    <circle cx="80"  cy="160" r="3"/><circle cx="120" cy="160" r="3"/>
  </g>

  <!-- Logo (logo-hero.png 1024x221 → display 780x168) -->
  <image href="logo-hero.png" x="210" y="155" width="780" height="168"/>

  <!-- Accent bar -->
  <rect x="210" y="348" width="100" height="5" rx="2.5" fill="url(#accent)"/>

  <!-- Description -->
  <text x="210" y="402" font-family="'Hiragino Sans','Yu Gothic','Meiryo',sans-serif" font-size="28" font-weight="500" fill="#0c4a6e">ブレインパッドの「中身」をもっと詳しく知ってもらうため、</text>
  <text x="210" y="444" font-family="'Hiragino Sans','Yu Gothic','Meiryo',sans-serif" font-size="28" font-weight="500" fill="#0c4a6e">研修資料、勉強会、文化について発信するプロジェクト。</text>

  <!-- Tags -->
  <rect x="210" y="490" width="110" height="34" rx="17" fill="#0ea5e9" opacity="0.2"/>
  <text x="265" y="513" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#0369a1">📃 資料公開</text>
  <rect x="334" y="490" width="100" height="34" rx="17" fill="#0ea5e9" opacity="0.2"/>
  <text x="384" y="513" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#0369a1">🎙 Podcast</text>
  <rect x="448" y="490" width="96" height="34" rx="17" fill="#0ea5e9" opacity="0.2"/>
  <text x="496" y="513" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#0369a1">🤝 Meetup</text>
  <rect x="558" y="490" width="80" height="34" rx="17" fill="#0ea5e9" opacity="0.2"/>
  <text x="598" y="513" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#0369a1">📖 書籍</text>

  <!-- URL -->
  <text x="210" y="592" font-family="sans-serif" font-size="17" fill="#0369a1" opacity="0.6">brainpad.github.io/OpenBrainPad</text>
</svg>
